name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build PWA
        run: npm run build:pwa
      - name: Check out existing Pages site
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: site
      - name: Place PWA under /online/
        run: |
          rm -rf site/online
          mkdir -p site/online
          cp -R build/pwa/. site/online/
      - name: Publish site and PWA to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          commit_message: "Deploy PWA under /online/"
