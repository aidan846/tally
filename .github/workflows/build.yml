name: Build Tally

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            bundlePath: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**
          - os: windows-latest
            label: windows-x86
            target: i686-pc-windows-msvc
            bundlePath: src-tauri/target/i686-pc-windows-msvc/release/bundle/**
          - os: macos-13
            label: macos-intel
            target: x86_64-apple-darwin
            bundlePath: src-tauri/target/x86_64-apple-darwin/release/bundle/**
          - os: macos-14
            label: macos-apple-silicon
            target: aarch64-apple-darwin
            bundlePath: src-tauri/target/aarch64-apple-darwin/release/bundle/**
          - os: ubuntu-22.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            bundlePath: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm test
      - run: npm run tauri:build -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: tally-${{ matrix.label }}
          path: ${{ matrix.bundlePath }}

  pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:pwa
      - uses: actions/upload-artifact@v4
        with:
          name: tally-pwa
          path: dist/
