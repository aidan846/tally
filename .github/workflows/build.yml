name: Build Tally

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  desktop:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            target: x86_64-pc-windows-msvc
            bundles: nsis
            bundlePath: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: windows-latest
            label: windows-x86
            target: i686-pc-windows-msvc
            bundles: nsis
            bundlePath: src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: macos-15-intel
            label: macos-intel
            target: x86_64-apple-darwin
            bundles: dmg
            bundlePath: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-15
            label: macos-apple-silicon
            target: aarch64-apple-darwin
            bundles: dmg
            bundlePath: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-24.04
            label: linux-x64
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            bundlePath: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run tauri:build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - uses: actions/upload-artifact@v4
        with:
          name: tally-desktop-${{ matrix.label }}
          path: ${{ matrix.bundlePath }}
          if-no-files-found: error

  pwa:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:pwa
        env:
          TALLY_WEB_BASE: /tally/online/
      - uses: actions/upload-artifact@v4
        with:
          name: tally-pwa
          path: dist/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: desktop
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tally-desktop-*
          path: release-assets
          merge-multiple: true
      - name: Verify release asset set
        shell: bash
        run: |
          check_count() {
            local pattern="$1"
            local expected="$2"
            local actual
            actual=$(find release-assets -type f -name "$pattern" | wc -l)
            if [ "$actual" -ne "$expected" ]; then
              echo "Expected $expected $pattern file(s), found $actual."
              find release-assets -type f -print
              exit 1
            fi
          }

          check_count '*.exe' 2
          check_count '*.dmg' 2
          check_count '*.deb' 1
          check_count '*.AppImage' 1

          unexpected=$(find release-assets -type f ! \( \
            -name '*.exe' -o \
            -name '*.dmg' -o \
            -name '*.deb' -o \
            -name '*.AppImage' \
          \) -print)
          if [ -n "$unexpected" ]; then
            echo "Unexpected files found in the release asset set:"
            echo "$unexpected"
            exit 1
          fi

          echo "Verified release assets:"
          find release-assets -type f -print | sort
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.AppImage
